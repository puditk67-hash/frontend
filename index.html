<!DOCTYPE html>
<html>
<head>
  <title>E-commerce Admin</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    nav {
      background: #333;
      padding: 10px;
    }

    nav a {
      color: white;
      margin-right: 15px;
      cursor: pointer;
      text-decoration: none;
    }

    .container {
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 15px;
      background: white;
    }

    th, td {
      border: 1px solid #333;
      padding: 8px;
    }

    input {
      padding: 5px;
      margin-right: 10px;
    }

    button {
      padding: 6px 12px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🔥 Navbar -->
<nav>
  <a onclick="showPage('dashboard')">Dashboard</a>
  <a onclick="showPage('customers')">Customers</a>
  <a onclick="showPage('products')">Products</a>
  <a onclick="showPage('orders')">Orders</a>
</nav>

<div class="container">
  <h2 id="title">Dashboard</h2>

  <div id="form"></div>
  <div id="table"></div>
</div>

<script>
const API = "https://ecommerce-api-theta-nine.vercel.app/api";

function showPage(page) {
  document.getElementById("table").innerHTML = "";
  document.getElementById("form").innerHTML = "";

  if (page === "dashboard") {
    document.getElementById("title").innerText = "Dashboard";
    document.getElementById("table").innerHTML =
      "Welcome to E-commerce Admin";
  }

  if (page === "customers") {
    document.getElementById("title").innerText = "Customers";

    document.getElementById("form").innerHTML = `
      <input id="name" placeholder="Name">
      <input id="email" placeholder="Email">
      <button onclick="addCustomer()">Add</button>
    `;

    loadCustomers();
  }

  if (page === "products") {
    document.getElementById("title").innerText = "Products";

    document.getElementById("form").innerHTML = `
      <input id="name" placeholder="Name">
      <input id="price" placeholder="Price">
      <input id="stock" placeholder="Stock">
      <button onclick="addProduct()">Add</button>
    `;

    loadProducts();
  }

  if (page === "orders") {
    document.getElementById("title").innerText = "Orders";

    document.getElementById("form").innerHTML =
      `<button>Create Order</button>`;

    loadOrders();
  }
}

// 🔹 CUSTOMERS
async function loadCustomers() {
  const res = await fetch(`${API}/customers`);
  const data = await res.json();

  let html = "<table><tr><th>id</th><th>name</th><th>email</th></tr>";

  data.forEach(c => {
    html += `<tr>
      <td>${c.id}</td>
      <td>${c.name}</td>
      <td>${c.email}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("table").innerHTML = html;
}

async function addCustomer() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  await fetch(`${API}/customers`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, email })
  });

  loadCustomers();
}

// 🔹 PRODUCTS
async function loadProducts() {
  const res = await fetch(`${API}/products`);
  const data = await res.json();

  let html = "<table><tr><th>id</th><th>name</th><th>price</th><th>stock</th></tr>";

  data.forEach(p => {
    html += `<tr>
      <td>${p.id}</td>
      <td>${p.name}</td>
      <td>${p.price}</td>
      <td>${p.stock}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("table").innerHTML = html;
}

async function addProduct() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const stock = document.getElementById("stock").value;

  await fetch(`${API}/products`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, price, stock })
  });

  loadProducts();
}

// 🔹 ORDERS
async function loadOrders() {
  const res = await fetch(`${API}/orders`);
  const data = await res.json();

  let html = "<table><tr><th>id</th><th>customer_id</th><th>total</th><th>status</th></tr>";

  data.forEach(o => {
    html += `<tr>
      <td>${o.id}</td>
      <td>${o.customer_id}</td>
      <td>${o.total}</td>
      <td>${o.status}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("table").innerHTML = html;
}
// ===== PRODUCTS =====
async function loadProducts() {
  document.getElementById("table").innerHTML = "Loading...";

  try {
    const res = await fetch(`${API}/products`);
    const data = await res.json();

    let html = "<table><tr><th>id</th><th>name</th><th>price</th><th>stock</th></tr>";

    data.forEach(p => {
      html += `<tr>
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>${p.price}</td>
        <td>${p.stock}</td>
      </tr>`;
    });

    html += "</table>";
    document.getElementById("table").innerHTML = html;

  } catch (err) {
    document.getElementById("table").innerHTML = "❌ โหลด Products ไม่ได้";
    console.log(err);
  }
}

// ===== ORDERS =====
async function loadOrders() {
  document.getElementById("table").innerHTML = "Loading...";

  try {
    const res = await fetch(`${API}/orders`);
    const data = await res.json();

    let html = "<table><tr><th>id</th><th>customer_id</th><th>total</th><th>status</th></tr>";

    data.forEach(o => {
      html += `<tr>
        <td>${o.id}</td>
        <td>${o.customer_id}</td>
        <td>${o.total}</td>
        <td>${o.status}</td>
      </tr>`;
    });

    html += "</table>";
    document.getElementById("table").innerHTML = html;

  } catch (err) {
    document.getElementById("table").innerHTML = "❌ โหลด Orders ไม่ได้";
    console.log(err);
  }
}
// โหลดหน้าแรก
showPage("dashboard");
</script>

</body>
</html>
