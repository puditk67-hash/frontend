<!DOCTYPE html>
<html>
<head>
  <title>E-commerce Admin</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      background: #f5f6fa;
    }

    /* NAVBAR */
    nav {
      background: #2f3640;
      padding: 15px;
      display: flex;
      gap: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    nav a:hover {
      color: #00a8ff;
    }

    /* CONTAINER */
    .container {
      padding: 30px;
    }

    /* CARD */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* INPUT */
    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-right: 10px;
    }

    /* BUTTON */
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #00a8ff;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #0097e6;
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th {
      background: #2f3640;
      color: white;
      padding: 12px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background: #f1f2f6;
    }
  </style>
</head>

<body>

<nav>
  <a onclick="showPage('dashboard')">Dashboard</a>
  <a onclick="showPage('customers')">Customers</a>
  <a onclick="showPage('products')">Products</a>
  <a onclick="showPage('orders')">Orders</a>
</nav>

<div class="container">
  <div class="card">
    <h2 id="title">Dashboard</h2>

    <div id="form"></div>
    <div id="table"></div>
  </div>
</div>

<script>
const API = "https://ecommerce-api-theta-nine.vercel.app/api";

function showPage(page) {
  document.getElementById("table").innerHTML = "";
  document.getElementById("form").innerHTML = "";

  if (page === "dashboard") {
    document.getElementById("title").innerText = "Dashboard";
    document.getElementById("table").innerHTML =
      "🚀 Welcome to E-commerce Admin";
  }

  if (page === "customers") {
    document.getElementById("title").innerText = "Customers";

    document.getElementById("form").innerHTML = `
      <input id="name" placeholder="Name">
      <input id="email" placeholder="Email">
      <button onclick="addCustomer()">Add</button>
    `;

    loadCustomers();
  }

  if (page === "products") {
    document.getElementById("title").innerText = "Products";

    document.getElementById("form").innerHTML = `
      <input id="name" placeholder="Name">
      <input id="price" placeholder="Price">
      <input id="stock" placeholder="Stock">
      <button onclick="addProduct()">Add</button>
    `;

    loadProducts();
  }

  if (page === "orders") {
    document.getElementById("title").innerText = "Orders";

    document.getElementById("form").innerHTML =
      `<button>Create Order</button>`;

    loadOrders();
  }
}

// ===== CUSTOMERS =====
async function loadCustomers() {
  document.getElementById("table").innerHTML = "Loading...";

  try {
    const res = await fetch(`${API}/customers`);
    const data = await res.json();

    let html = "<table><tr><th>ID</th><th>Name</th><th>Email</th></tr>";

    data.forEach(c => {
      html += `<tr>
        <td>${c.id}</td>
        <td>${c.name}</td>
        <td>${c.email}</td>
      </tr>`;
    });

    html += "</table>";
    document.getElementById("table").innerHTML = html;

  } catch {
    document.getElementById("table").innerHTML = "❌ โหลด Customers ไม่ได้";
  }
}

async function addCustomer() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  await fetch(`${API}/customers`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, email })
  });

  alert("✅ Added Customer!");
  loadCustomers();
}

// ===== PRODUCTS =====
async function loadProducts() {
  document.getElementById("table").innerHTML = "Loading...";

  try {
    const res = await fetch(`${API}/products`);
    const data = await res.json();

    let html = "<table><tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th></tr>";

    data.forEach(p => {
      html += `<tr>
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>${p.price}</td>
        <td>${p.stock}</td>
      </tr>`;
    });

    html += "</table>";
    document.getElementById("table").innerHTML = html;

  } catch {
    document.getElementById("table").innerHTML = "❌ โหลด Products ไม่ได้";
  }
}

async function addProduct() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const stock = document.getElementById("stock").value;

  await fetch(`${API}/products`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, price, stock })
  });

  alert("✅ Added Product!");
  loadProducts();
}

// ===== ORDERS =====
async function loadOrders() {
  document.getElementById("table").innerHTML = "Loading...";

  try {
    const res = await fetch(`${API}/orders`);
    const data = await res.json();

    let html = "<table><tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th></tr>";

    data.forEach(o => {
      html += `<tr>
        <td>${o.id}</td>
        <td>${o.customer_id}</td>
        <td>${o.total}</td>
        <td>${o.status}</td>
      </tr>`;
    });

    html += "</table>";
    document.getElementById("table").innerHTML = html;

  } catch {
    document.getElementById("table").innerHTML = "❌ โหลด Orders ไม่ได้";
  }
}

// โหลดหน้าแรก
showPage("dashboard");
</script>

</body>
</html>
